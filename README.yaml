description: |-
  Terraform module to create and manage Monitoring Resource on Digital Ocean.

usage : |-
  Here are examples of how you can use this module in your inventory structure:
  ### basic example
  ```hcl
      module "uptime-alert" {
      source                   = "terraform-do-modules/monitoring/digitalocean"
      version                  = "1.0.5"
      name                     = "app"
      environment              = "test"
      target_url  = ["http://test.do.clouddrove.ca/"]
      type        = ["http"]
      alert_type  = ["down_global"]
      period      = ["2m"]
      comparison  = ["less_than"]
      ####
      notifications = [
        {
          email = ["example@gmail.com"]
          slack = [
            {
              channel = "testing"
              url     = "https://hooks.slack.com/services/TEXXXXXXXXxxxxYTGH8DNkjgggyKipj"
            }
          ]
        }
      ]
    }
  ```
  ### complete example
  ```hcl
      module "uptime-alert" {
      source                   = "terraform-do-modules/monitoring/digitalocean"
      version                  = "1.0.5"
      name                     = "app"
      environment              = "test"
      target_url  = ["http://test.do.clouddrove.ca/", "https://test2.do.clouddrove.ca/"]
      type        = ["http", "https"]
      alert_type  = ["down_global"]
      period      = ["2m", "3m"]
      comparison  = ["less_than"]
      ####
      notifications = [
        {
          email = ["example@gmail.com"]
          slack = [
            {
              channel = "testing"
              url     = "https://hooks.slack.com/services/TEXXXXXXXXxxxxYTGH8DNkjgggyKipj"
            }
          ]
        }
      ]
    }
  ```
  ### resource  alert
  ```hcl
      module "resource-alert" {
      source             = "terraform-do-modules/monitoring/digitalocean"
      version            = "1.0.5"
      name               = "app"
      environment        = "test"
      resource_alerts = {
        "alert1" = {
          alerts = [
            {
              email = ["example@gmail.com"]
              slack = [
                {
                  channel = "testing"
                  url     = "https://hooks.slack.com/services/TEXXXXXXXXxxxxYTGH8DNkjgggyKipj"
                }
              ]
            }
          ]
          window      = "5m"
          type        = "v1/insights/droplet/cpu"
          compare     = "GreaterThan"
          value       = 95
          enabled     = true
          entities    = [module.droplet.id[0]]
          description = "Alert about CPU usage"
          tags        = ["test"]
        },
      }
    }
  ```
  ### uptime alert
  ```hcl
      module "uptime-alert" {
      source                   = "terraform-do-modules/monitoring/digitalocean"
      version                  = "1.0.5"
      name                     = "app"
      environment              = "test"
      target_url  = ["http://test.do.clouddrove.ca/", "https://test2.do.clouddrove.ca/"]
      type        = ["http", "https"]
      alert_type  = ["down_global"]
      period      = ["2m", "3m"]
      comparison  = ["less_than"]
      ####
      notifications = [
        {
          email = ["example@gmail.com"]
          slack = [
            {
              channel = "testing"
              url     = "https://hooks.slack.com/services/TEXXXXXXXXxxxxYTGH8DNkjgggyKipj"
            }
          ]
        }
      ]
    }
  ```

  ### Deploy with Terraform
  ```bash
  terraform init
  terraform plan
  terraform apply
  ```

  ### Deploy with OpenTofu
  ```bash
  tofu init
  tofu plan
  tofu apply
  ```

  ### Deploy with Terragrunt
  See [`examples/terragrunt/terragrunt.hcl`](./examples/terragrunt/terragrunt.hcl) for a complete example using DigitalOcean Spaces as remote state.
  ```bash
  export DIGITALOCEAN_TOKEN="<your-token>"
  export SPACES_ACCESS_KEY_ID="<your-spaces-key>"
  export SPACES_SECRET_ACCESS_KEY="<your-spaces-secret>"
  cd examples/terragrunt
  terragrunt init
  terragrunt plan
  terragrunt apply
  ```